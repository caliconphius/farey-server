services:
  julia-server:
    build:
      context: back
      dockerfile: backend/Dockerfile
      target: runtime
    container_name: julia-farey-server
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      PORT: "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  proxy:
    image: nginx
    volumes:
      - type: bind
        source: ./proxy/nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    ports:
      - 80:80
    depends_on:
      - backend
