services:
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
      target: runtime
    container_name: julia-farey-server
    # ports:
    #   - "${HOST_PORT:-80}:80"
    environment:
      PORT: "8000"
    restart: unless-stopped
  proxy:
    image: nginx
    volumes:
      - type: bind
        source: ./proxy/nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    ports:
      - 80:80
    depends_on:
      - backend
