version: "3.9"

services:
  julia-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: julia-mux-server
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      PORT: "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
